<svg width="1200" height="630" viewBox="0 0 1200 630" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="1200" height="630" fill="#060606"/>

  <!-- Radial gradient glow -->
  <defs>
    <radialGradient id="centerGlow" cx="50%" cy="50%" r="50%" fx="50%" fy="50%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.03"/>
      <stop offset="100%" stop-color="#060606" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="vignette" cx="50%" cy="50%" r="70%" fx="50%" fy="50%">
      <stop offset="0%" stop-color="#060606" stop-opacity="0"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0.7"/>
    </radialGradient>
  </defs>

  <rect width="1200" height="630" fill="url(#centerGlow)"/>
  <rect width="1200" height="630" fill="url(#vignette)"/>

  <!-- Decorative ring -->
  <circle cx="600" cy="240" r="45" stroke="rgba(255,255,255,0.06)" stroke-width="1" fill="none"/>
  <circle cx="600" cy="240" r="4" fill="rgba(255,255,255,0.25)"/>

  <!-- Title -->
  <text x="600" y="340" text-anchor="middle" font-family="Georgia, serif" font-size="72" font-weight="300" fill="#ffffff" letter-spacing="3">The Mirror</text>

  <!-- Divider line -->
  <line x1="560" y1="375" x2="640" y2="375" stroke="rgba(255,255,255,0.12)" stroke-width="1"/>

  <!-- Tagline -->
  <text x="600" y="420" text-anchor="middle" font-family="system-ui, sans-serif" font-size="20" font-weight="300" fill="rgba(255,255,255,0.5)" letter-spacing="0.5">I won't help you.</text>
  <text x="600" y="455" text-anchor="middle" font-family="system-ui, sans-serif" font-size="20" font-weight="300" fill="rgba(255,255,255,0.5)" letter-spacing="0.5">I'll ask you the one question you're not asking yourself.</text>

  <!-- Subtle quote mark -->
  <text x="600" y="540" text-anchor="middle" font-family="Georgia, serif" font-size="120" font-weight="300" fill="rgba(255,255,255,0.03)">"</text>

  <!-- MachineMind credit -->
  <text x="600" y="600" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" font-weight="300" fill="rgba(255,255,255,0.15)" letter-spacing="3">MACHINEMIND</text>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <!-- Dramatic radial gradient background -->
    <radialGradient id="vignette" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#0E0E0E"/>
      <stop offset="70%" stop-color="#0A0A0A"/>
      <stop offset="100%" stop-color="#050505"/>
    </radialGradient>

    <!-- Gold glow effect -->
    <filter id="goldGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Subtle noise texture -->
    <filter id="noise">
      <feTurbulence type="fractalNoise" baseFrequency="0.9" numOctaves="4" result="noise"/>
      <feColorMatrix type="saturate" values="0"/>
      <feBlend in="SourceGraphic" in2="noise" mode="overlay" result="blend"/>
      <feComposite in="blend" in2="SourceGraphic" operator="in"/>
    </filter>
  </defs>

  <!-- Background with vignette -->
  <rect width="1200" height="630" fill="url(#vignette)"/>

  <!-- Subtle concentric rings (portal effect) -->
  <circle cx="600" cy="250" r="180" fill="none" stroke="#C9A84C" stroke-width="0.3" opacity="0.08"/>
  <circle cx="600" cy="250" r="140" fill="none" stroke="#C9A84C" stroke-width="0.4" opacity="0.12"/>
  <circle cx="600" cy="250" r="100" fill="none" stroke="#C9A84C" stroke-width="0.5" opacity="0.18"/>

  <!-- Central icon mark with glow -->
  <circle cx="600" cy="250" r="75" fill="#0C0C0C"/>

  <!-- Main fracture line (gold) -->
  <path d="M600 175 L598 200 L602 218 L597 240 L603 258 L600 270 L597 288 L603 308 L598 325"
        stroke="#C9A84C" stroke-width="6" fill="none" opacity="0.2" stroke-linecap="round" filter="url(#goldGlow)"/>
  <path d="M600 175 L598 200 L602 218 L597 240 L603 258 L600 270 L597 288 L603 308 L598 325"
        stroke="#C9A84C" stroke-width="2.5" fill="none" opacity="0.8" stroke-linecap="round"/>
  <path d="M600 175 L598 200 L602 218 L597 240 L603 258 L600 270 L597 288 L603 308 L598 325"
        stroke="#FFFAF0" stroke-width="0.8" fill="none" opacity="0.4" stroke-linecap="round"/>

  <!-- Branch fractures -->
  <path d="M597 240 L578 232 L560 230" stroke="#C9A84C" stroke-width="1.5" fill="none" opacity="0.5" stroke-linecap="round"/>
  <path d="M603 258 L622 255 L640 258" stroke="#C9A84C" stroke-width="1.5" fill="none" opacity="0.5" stroke-linecap="round"/>
  <path d="M597 288 L575 285 L558 290" stroke="#C9A84C" stroke-width="1.2" fill="none" opacity="0.35" stroke-linecap="round"/>
  <path d="M603 308 L625 312 L642 306" stroke="#C9A84C" stroke-width="1.2" fill="none" opacity="0.35" stroke-linecap="round"/>

  <!-- Outer ring -->
  <circle cx="600" cy="250" r="75" fill="none" stroke="#C9A84C" stroke-width="0.8" opacity="0.35"/>

  <!-- THE -->
  <text x="600" y="405" text-anchor="middle" font-family="'Helvetica Neue', Arial, sans-serif" font-size="16" font-weight="300" letter-spacing="12" fill="#777777">THE</text>

  <!-- MIRROR - main wordmark -->
  <text x="600" y="465" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="68" font-weight="400" letter-spacing="10" fill="#F0F0F0">MIRROR</text>

  <!-- Fracture through wordmark -->
  <path d="M715 418 L713 438 L717 455 L713 472 L716 490 L712 505" stroke="#C9A84C" stroke-width="3" fill="none" opacity="0.15" stroke-linecap="round"/>
  <path d="M715 418 L713 438 L717 455 L713 472 L716 490 L712 505" stroke="#C9A84C" stroke-width="1.2" fill="none" opacity="0.55" stroke-linecap="round"/>

  <!-- Tagline - the hook -->
  <text x="600" y="520" text-anchor="middle" font-family="'Helvetica Neue', Arial, sans-serif" font-size="14" font-weight="300" letter-spacing="4" fill="#666666">I WON'T HELP YOU.</text>
  <text x="600" y="545" text-anchor="middle" font-family="'Helvetica Neue', Arial, sans-serif" font-size="14" font-weight="300" letter-spacing="4" fill="#888888">I'LL ASK THE QUESTION YOU'RE NOT ASKING YOURSELF.</text>

  <!-- Bottom bar -->
  <line x1="350" y1="590" x2="850" y2="590" stroke="#222222" stroke-width="0.5"/>
  <text x="600" y="612" text-anchor="middle" font-family="'Helvetica Neue', Arial, sans-serif" font-size="10" font-weight="400" letter-spacing="6" fill="#444444">MACHINEMIND</text>
</svg>
